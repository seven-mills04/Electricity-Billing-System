# ──────────────────────────────────────────────────────────────
# PRODUCTION application.properties
# All sensitive values come from environment variables (set in
# Render / Railway dashboard — never commit secrets to git).
# ──────────────────────────────────────────────────────────────

spring.application.name=ElectricityBillingSystem

# ── Database ────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:mysql://db:3306/electricitybillingsystem?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
# 'update' auto-creates/alters tables on startup (safe for demo)
# Change to 'validate' once schema is stable
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── JWT ─────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── CORS ─────────────────────────────────────────────────────
# Comma-separated allowed origins — set this env var on Render
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# ── Springdoc / Swagger ─────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Server ──────────────────────────────────────────────────
server.port=${PORT:8080}
